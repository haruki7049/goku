<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>goku</title>
  </head>

  <body>
    <iframe srcdoc="
      <!DOCTYPE html>
      <script src=&quot;wasm_exec.js^quot;></script>
      <script>
        const go = new Go();
        WebAssembly.instantiateStreaming(fetch(&quot;goku.wasm&quot;), go.importObject).then(result => {
          go.run(result.instance);
        });
      </script>
    " width="640" height="480"></iframe>
  </body>
</html>
