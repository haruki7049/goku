<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>goku</title>
  </head>

  <body>
    <script src="wasm_exec.js"></script>
    <script>
      const go = new Go();
      WebAssembly.instantiateStreaming(fetch(&quot;goku.wasm&quot;), go.importObject).then(result => {
        go.run(result.instance);
      });
    </script>
  </body>
</html>
